<VirtualHost *:80>
    ServerAdmin admin@naccafe.local
    DocumentRoot /var/www/html
    ServerName naccafe.local

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/uploads>
        Options -Indexes
        AllowOverride None
        Require all granted
        # Intentionally NO restriction on PHP execution in uploads
    </Directory>

    <Directory /var/www/html/old-config>
        Options +Indexes
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
