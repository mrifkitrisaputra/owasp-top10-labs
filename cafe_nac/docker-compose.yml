version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    ports:
      - "8090:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_USER=nac_user
      - DB_PASS=nac_password
      - DB_NAME=nac_cafe
    volumes:
      - uploads_data:/var/www/html/uploads
    networks:
      - nac_network
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=r00tP@ssw0rd_nac2024
      - MYSQL_DATABASE=nac_cafe
      - MYSQL_USER=nac_user
      - MYSQL_PASSWORD=nac_password
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    networks:
      - nac_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pr00tP@ssw0rd_nac2024"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  internal-service:
    build:
      context: ./internal-service
      dockerfile: Dockerfile
      network: host
    networks:
      - nac_network
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:

networks:
  nac_network:
    driver: bridge
