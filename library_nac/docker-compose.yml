version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: library_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_2024
      MYSQL_DATABASE: library_ctf
      MYSQL_USER: library_user
      MYSQL_PASSWORD: library_pass_2024
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - library_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PHP-Apache Application
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: library_webapp
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: library_user
      DB_PASS: library_pass_2024
      DB_NAME: library_ctf
    volumes:
      - ./backend:/var/www/html/backend
      - ./frontend:/var/www/html/frontend
    ports:
      - "8080:80"
    networks:
      - library_network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  library_network:
    driver: bridge
